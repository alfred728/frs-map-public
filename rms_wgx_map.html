<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMS & WGX Tenement Map — WA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C4922A;
    --gold-light: #E8C868;
    --bg: #0B0F14;
    --surface: #141A22;
    --elevated: #1C2430;
    --border: #2A3240;
    --text: #E6EDF3;
    --text-secondary: #8B949E;
    --text-muted: #484F58;

    --rms-color: #3B82F6;
    --rms-fill: rgba(59, 130, 246, 0.18);
    --rms-active: #60A5FA;

    --wgx-color: #F97316;
    --wgx-fill: rgba(249, 115, 22, 0.18);
    --wgx-active: #FB923C;

    --ozm-color: #22C55E;
    --ozm-fill: rgba(34, 197, 94, 0.18);
    --ozm-active: #4ADE80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  #topbar {
    height: 52px;
    min-height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 1000;
    position: relative;
  }

  #topbar .logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
  }

  #topbar .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  #topbar .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }

  #topbar .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  /* ── Map container ── */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    background: #0d1117;
  }

  /* ── Control panel ── */
  #panel {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 800;
    width: 260px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #panel-header {
    padding: 12px 14px;
    background: var(--elevated);
    border-bottom: 1px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .layer-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .layer-row:last-child { border-bottom: none; }
  .layer-row:hover { background: var(--elevated); }
  .layer-row.off { opacity: 0.45; }

  .swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .layer-info { flex: 1; min-width: 0; }
  .layer-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }
  .layer-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .layer-count {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 8px;
    white-space: nowrap;
  }

  /* ── Info popup panel ── */
  #info-panel {
    position: absolute;
    bottom: 24px;
    left: 16px;
    z-index: 800;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    animation: slideUp 0.2s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #info-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  #info-badge {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  #info-id {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
  }

  #info-close {
    margin-left: auto;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: none;
    background: var(--elevated);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #info-close:hover { background: var(--border); }

  #info-body { padding: 12px 14px; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid rgba(42, 50, 64, 0.5);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text-secondary); }
  .info-value { font-weight: 600; color: var(--text); text-align: right; max-width: 160px; }

  .status-live {
    color: #3fb950;
    font-weight: 700;
  }
  .status-pending {
    color: #d29922;
    font-weight: 700;
  }

  /* ── Stats bar ── */
  #stats-bar {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 800;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .stat-pill .sp-label {
    color: var(--text-secondary);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .stat-pill .sp-val {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 18px;
    line-height: 1.2;
  }
  .stat-pill .sp-sub {
    color: var(--text-secondary);
    font-size: 10px;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0d1117; }
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
  }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-bottom: 1px solid var(--border) !important;
    width: 30px !important;
    height: 30px !important;
    line-height: 30px !important;
  }
  .leaflet-control-zoom a:hover { background: var(--elevated) !important; }
  .leaflet-control-attribution {
    background: rgba(11, 15, 20, 0.7) !important;
    color: var(--text-muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--text-secondary) !important; }

  /* ── Loading overlay ── */
  #loader {
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.4s;
  }
  #loader.done { opacity: 0; pointer-events: none; }

  .loader-logo {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .loader-text {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .loader-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    animation: loadBar 1.2s ease-in-out infinite;
  }
  @keyframes loadBar {
    0%   { width: 0; margin-left: 0; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0; margin-left: 100%; }
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loader">
  <div class="loader-logo">FRS Intelligence</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-text">Loading tenement data…</div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">FRS Intelligence</div>
  <div class="divider"></div>
  <div class="title">Competitor Tenement Map — WA</div>
  <div class="subtitle">Source: DMIRS Live &nbsp;·&nbsp; As of 14 Apr 2026</div>
</div>

<!-- Map -->
<div id="map-wrap">
  <div id="map"></div>

  <!-- Layer control -->
  <div id="panel">
    <div id="panel-header">Layers</div>
    <div class="layer-row" id="toggle-rms" onclick="toggleLayer('rms')">
      <div class="swatch" style="background:var(--rms-color)"></div>
      <div class="layer-info">
        <div class="layer-name">Ramelius Resources</div>
        <div class="layer-sub">ASX: RMS</div>
      </div>
      <div class="layer-count" id="count-rms">—</div>
    </div>
    <div class="layer-row" id="toggle-wgx" onclick="toggleLayer('wgx')">
      <div class="swatch" style="background:var(--wgx-color)"></div>
      <div class="layer-info">
        <div class="layer-name">Westgold Resources</div>
        <div class="layer-sub">ASX: WGX</div>
      </div>
      <div class="layer-count" id="count-wgx">—</div>
    </div>
    <div class="layer-row" id="toggle-ozm" onclick="toggleLayer('ozm')">
      <div class="swatch" style="background:var(--ozm-color)"></div>
      <div class="layer-info">
        <div class="layer-name">OzAurum Resources</div>
        <div class="layer-sub">ASX: OZM</div>
      </div>
      <div class="layer-count" id="count-ozm">—</div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat-pill">
      <div class="sp-label">Total tenements</div>
      <div class="sp-val" id="stat-total" style="color:var(--text)">—</div>
      <div class="sp-sub">RMS + WGX + OZM combined</div>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel">
    <div id="info-header">
      <span id="info-badge"></span>
      <span id="info-id"></span>
      <button id="info-close" onclick="closeInfo()">✕</button>
    </div>
    <div id="info-body"></div>
  </div>
</div>

<script>
const STYLE = {
  rms: { color: '#3B82F6', fillColor: '#3B82F6', fillOpacity: 0.15, weight: 1.2, opacity: 0.85 },
  wgx: { color: '#F97316', fillColor: '#F97316', fillOpacity: 0.15, weight: 1.2, opacity: 0.85 },
  ozm: { color: '#22C55E', fillColor: '#22C55E', fillOpacity: 0.15, weight: 1.2, opacity: 0.85 },
  hover: { fillOpacity: 0.35, weight: 2 },
};

const map = L.map('map', {
  center: [-27.5, 121],
  zoom: 6,
  zoomControl: true,
});

// Try CartoDB dark, fallback to OSM
const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
});
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
});
cartoDark.addTo(map);
cartoDark.on('tileerror', () => { map.removeLayer(cartoDark); osm.addTo(map); });

const layers = { rms: null, wgx: null, ozm: null };
const visible = { rms: true, wgx: true, ozm: true };

function formatDate(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatArea(area, unit) {
  if (!area) return '—';
  const v = parseFloat(area).toFixed(1);
  return v + ' ' + (unit || '');
}

function openInfo(props, company) {
  const panel = document.getElementById('info-panel');
  const badge = document.getElementById('info-badge');
  const idEl  = document.getElementById('info-id');
  const body  = document.getElementById('info-body');

  const isRms = company === 'rms';
  badge.textContent = isRms ? 'RMS' : 'WGX';
  badge.style.background = isRms ? 'rgba(59,130,246,0.2)' : 'rgba(249,115,22,0.2)';
  badge.style.color = isRms ? '#60A5FA' : '#FB923C';
  badge.style.border = `1px solid ${isRms ? 'rgba(59,130,246,0.4)' : 'rgba(249,115,22,0.4)'}`;

  idEl.textContent = props.fmt_tenid || props.tenement_id || '—';

  const statusClass = (props.tenstatus || '').toLowerCase() === 'live' ? 'status-live' : 'status-pending';

  const rows = [
    ['Type',    props.type || '—'],
    ['Status',  `<span class="${statusClass}">${props.tenstatus || '—'}</span>`],
    ['Holder',  props.entity || props.holder || '—'],
    ['Area',    formatArea(props.legal_area, props.unit_of_me)],
    ['Granted', formatDate(props.grantdate)],
    ['Expires', formatDate(props.enddate)],
  ];

  body.innerHTML = rows.map(([l, v]) =>
    `<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v}</span></div>`
  ).join('');

  panel.style.display = 'block';
}

function closeInfo() {
  document.getElementById('info-panel').style.display = 'none';
}

function makeLayer(geojson, company) {
  const style = STYLE[company];
  return L.geoJSON(geojson, {
    style: () => ({ ...style }),
    onEachFeature(feature, layer) {
      layer.on({
        mouseover(e) {
          e.target.setStyle({ fillOpacity: STYLE.hover.fillOpacity, weight: STYLE.hover.weight });
          e.target.bringToFront();
        },
        mouseout(e) {
          layers[company].resetStyle(e.target);
        },
        click(e) {
          openInfo(feature.properties, company);
          e.stopPropagation();
        },
      });
    },
  });
}

function toggleLayer(company) {
  visible[company] = !visible[company];
  const row = document.getElementById('toggle-' + company);
  if (visible[company]) {
    row.classList.remove('off');
    if (layers[company]) map.addLayer(layers[company]);
  } else {
    row.classList.add('off');
    if (layers[company]) map.removeLayer(layers[company]);
  }
}

map.on('click', closeInfo);

async function loadData() {
  const [rmsData, wgxData, ozmData] = await Promise.all([
    fetch('scrape_output/RMS_tenements_dmirs.geojson').then(r => r.json()),
    fetch('scrape_output/WGX_tenements_dmirs.geojson').then(r => r.json()),
    fetch('scrape_output/OZM_tenements_dmirs.geojson').then(r => r.json()),
  ]);

  const rmsCount = rmsData.features.length;
  const wgxCount = wgxData.features.length;
  const ozmCount = ozmData.features.length;

  document.getElementById('count-rms').textContent = rmsCount.toLocaleString();
  document.getElementById('count-wgx').textContent = wgxCount.toLocaleString();
  document.getElementById('count-ozm').textContent = ozmCount.toLocaleString();
  document.getElementById('stat-total').textContent = (rmsCount + wgxCount + ozmCount).toLocaleString();

  layers.rms = makeLayer(rmsData, 'rms').addTo(map);
  layers.wgx = makeLayer(wgxData, 'wgx').addTo(map);
  layers.ozm = makeLayer(ozmData, 'ozm').addTo(map);

  // Fit to combined bounds
  const bounds = layers.rms.getBounds().extend(layers.wgx.getBounds()).extend(layers.ozm.getBounds());
  map.fitBounds(bounds, { padding: [40, 40] });

  // Hide loader
  document.getElementById('loader').classList.add('done');
}

loadData().catch(err => {
  console.error(err);
  document.querySelector('.loader-text').textContent = 'Failed to load data.';
});
</script>
</body>
</html>
